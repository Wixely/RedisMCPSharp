name: Build Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOTNET_VERSION: 10.0.x

jobs:
  publish:
    name: Publish ${{ matrix.runtime_id }} ${{ matrix.package_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime_id: win-x64
            package_type: framework-dependent
            self_contained: false
          - runtime_id: linux-x64
            package_type: framework-dependent
            self_contained: false
          - runtime_id: win-x64
            package_type: self-contained
            self_contained: true
          - runtime_id: linux-x64
            package_type: self-contained
            self_contained: true

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Resolve build metadata
        shell: bash
        run: |
          set -euo pipefail
          project_name="${GITHUB_REPOSITORY#*/}"
          solution_file="$(find . -maxdepth 2 -name '*.sln' | sort | head -n 1)"
          project_file="$(find . -path '*/bin/*' -prune -o -path '*/obj/*' -prune -o -name "${project_name}.csproj" -print | sort | head -n 1)"

          if [[ -z "${solution_file}" || -z "${project_file}" ]]; then
            echo "Could not resolve solution/project. solution='${solution_file}' project='${project_file}'" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            package_version="${GITHUB_REF_NAME}"
          else
            package_version="dev-${GITHUB_RUN_NUMBER}"
          fi

          echo "PROJECT_NAME=${project_name}" >> "$GITHUB_ENV"
          echo "SOLUTION_FILE=${solution_file}" >> "$GITHUB_ENV"
          echo "PROJECT_FILE=${project_file}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"
          echo "PACKAGE_BASENAME=${project_name}-${{ matrix.runtime_id }}-${{ matrix.package_type }}" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_FILE }}"

      - name: Build
        run: dotnet build "${{ env.SOLUTION_FILE }}" -c Release --no-restore

      - name: Test
        run: dotnet test "${{ env.SOLUTION_FILE }}" -c Release --no-build --verbosity normal

      - name: Publish
        run: >
          dotnet publish "${{ env.PROJECT_FILE }}"
          -c Release
          -r ${{ matrix.runtime_id }}
          --self-contained ${{ matrix.self_contained }}
          -o "publish/${{ matrix.runtime_id }}-${{ matrix.package_type }}"
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=${{ matrix.self_contained }}
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -p:IsTransformWebConfigDisabled=true
          -p:StaticWebAssetsEnabled=false
          -p:DebugType=none
          -p:DebugSymbols=false
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd "publish/${{ matrix.runtime_id }}-${{ matrix.package_type }}"
          zip -r "../../${PACKAGE_BASENAME}-${PACKAGE_VERSION}.zip" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: ${{ env.PACKAGE_BASENAME }}-${{ env.PACKAGE_VERSION }}.zip
          if-no-files-found: error

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILD_RECORD_UPLOAD: false

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Compute image name
        shell: bash
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: ${{ github.event.repository.name }}-*

      - name: Show release assets
        shell: bash
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*/*.zip)
          if (( ${#assets[@]} == 0 )); then
            echo "No release ZIP assets found." >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
